name: comparator

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Cache comparator toolchain
        uses: actions/cache@v6
        with:
          path: ~/.cache/krafftsieve-comparator
          key: comparator-${{ hashFiles('lean-toolchain') }}
      - name: Run comparator
        env:
          LANDRUN_LOG_LEVEL: debug
        run: ./verify.sh
